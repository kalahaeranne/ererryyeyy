
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POV: the city isn’t the only thing glowing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    .fullscreen-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .play-button {
      position: absolute;
      width: 90px;
      height: 90px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .triangle {
      width: 0;
      height: 0;
      border-left: 30px solid white;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <div class="fullscreen-overlay" onclick="goRedirect()">
    <video autoplay muted loop playsinline>
      <source src="https://cdn.videy.co/YBLHi4QX1.mp4" type="video/mp4" />
      Browser Anda tidak mendukung video.
    </video>

    <div class="play-button">
      <div class="triangle"></div>
    </div>
  </div>

  <script>
    function goRedirect() {
      window.location.href = "https://www.profitablecpmratenetwork.com/nxhiyfe8u9?key=29786ea5f9fc6581e9b50ef47a13284c";
    }
  </script>
</body>
</html>
